<!DOCTYPE html>
<html>
<head>
    <title>Clicker Game</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Clicker Game</h1>

    <p id="Money">0</p>

    <div id="upgrades">
        <button class="Upgrade" onclick="Upgrade1()">+5 Click / Cost 100</button>
        <button class="Upgrade" onclick="Upgrade2()">+100 Click / Cost 5,000</button>
        <button class="Upgrade" onclick="Upgrade3()">+500 Click / Cost 10,000</button>
        <button class="Upgrade" onclick="Upgrade4()">+10,000 Click / Cost 500,000</button>
        <button class="Upgrade" onclick="Upgrade5()">+50,000 Click / Cost 1,000,000</button>
        <button class="Upgrade" onclick="Upgrade6()">+100,000 Click / Cost 50,000,000</button>
    </div>

    <div id="upgrades2">
        <button class="Upgrade2" onclick="Upgrade11()">+5 Click per second / Cost 1,000</button>
        <button class="Upgrade2" onclick="Upgrade22()">+100 Click per second / Cost 50,000</button>
        <button class="Upgrade2" onclick="Upgrade33()">+500 Click per second / Cost 100,000</button>
        <button class="Upgrade2" onclick="Upgrade44()">+10,000 Click per second / Cost 5,000,000</button>
        <button class="Upgrade2" onclick="Upgrade55()">+50,000 Click per second / Cost 10,000,000</button>
        <button class="Upgrade2" onclick="Upgrade66()">+100,000 Click per second / Cost 500,000,000</button>
    </div>

    <button id="Click" onclick="clickButton()">Click</button>

    <button id="MoreGames" onclick="window.location.href='https://github.com/SomethingIdkreally'">
        More Games
    </button>

    <script src="script.js"></script>
</body>
</html>
